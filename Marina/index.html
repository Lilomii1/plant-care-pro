<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Plant Care — уход за растениями</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #f0f4f8; }
        .card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.03); transition: all 0.2s; }
        .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-1px); }
        .sidebar-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .btn-primary { background: #2d6a4f; color: white; transition: all 0.2s; }
        .btn-primary:hover { background: #1b4d3e; transform: translateY(-1px); }
        .btn-outline { background: white; border: 1px solid #d0d5dd; color: #344054; }
        .btn-outline:hover { background: #f9fafb; border-color: #2d6a4f; }
        .tab-active { background: #2d6a4f; color: white; box-shadow: 0 2px 6px rgba(45,106,79,0.2); }
        .tab-inactive { background: #f1f5f9; color: #475569; }
        .tab-inactive:hover { background: #e6edf4; }
        .calendar-day { transition: all 0.1s ease; cursor: pointer; border-radius: 12px; }
        .calendar-day:hover { background: #e6f4ea; }
        input, select, textarea { transition: all 0.15s; border: 1px solid #e2e8f0; border-radius: 14px; padding: 10px 14px; background: white; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2d6a4f; box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
        button { cursor: pointer; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2d6a4f; border-radius: 10px; }
        .badge-water { background: #e0f2fe; color: #0369a1; }
        .badge-phase { background: #dcfce7; color: #166534; }
    </style>
</head>
<body class="bg-[#f0f4f8] text-gray-800 h-screen overflow-hidden">
    <div class="flex flex-col h-full max-w-7xl mx-auto w-full px-4 py-3">
        <!-- Header -->
        <header class="flex items-center justify-between py-3 flex-shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-xl bg-[#2d6a4f] flex items-center justify-center shadow-sm">
                    <span class="text-white text-lg">🌱</span>
                </div>
                <h1 class="text-xl font-semibold text-gray-800">Plant Care</h1>
            </div>
            <div class="flex items-center gap-2">
                <div class="relative">
                    <button id="language-btn" class="flex items-center gap-1 px-3 py-1.5 rounded-full bg-white border border-gray-200 text-sm shadow-sm">
                        <span>🌐</span>
                        <span id="current-lang" class="text-xs font-medium">RU</span>
                    </button>
                    <div id="language-dropdown" class="absolute right-0 top-full mt-2 bg-white border border-gray-200 rounded-xl shadow-lg z-50 hidden overflow-hidden">
                        <button id="lang-ru" class="flex items-center gap-2 w-full px-4 py-2 hover:bg-gray-50 text-sm">🇷🇺 Русский</button>
                        <button id="lang-en" class="flex items-center gap-2 w-full px-4 py-2 hover:bg-gray-50 text-sm">🇺🇸 English</button>
                    </div>
                </div>
                <a href="https://github.com/h47e/plant-care-pro" target="_blank" class="p-2 rounded-full bg-white border border-gray-200 hover:bg-gray-50"><svg class="w-4 h-4 text-gray-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg></a>
                <button id="settings-btn" class="p-2 rounded-full bg-white border border-gray-200 hover:bg-gray-50"><svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></button>
            </div>
        </header>

        <!-- Mobile menu -->
        <button id="mobile-menu-btn" class="fixed bottom-5 left-5 z-50 lg:hidden p-3 rounded-full bg-[#2d6a4f] text-white shadow-md">☰</button>
        <div id="mobile-overlay" class="fixed inset-0 bg-black/30 z-40 lg:hidden hidden"></div>

        <div class="flex flex-1 overflow-hidden gap-5 mt-3">
            <!-- Sidebar Light -->
            <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-80 lg:w-72 bg-white rounded-2xl shadow-sm flex flex-col overflow-y-auto transform -translate-x-full lg:translate-x-0 transition-all duration-200">
                <div class="p-5">
                    <div class="flex items-center gap-2 text-[#2d6a4f] mb-5">
                        <span class="text-xl">🌿</span>
                        <h2 class="font-semibold text-lg">Мои растения</h2>
                    </div>
                    <button id="add-plant-btn" class="w-full bg-[#2d6a4f] text-white px-4 py-3 rounded-xl font-medium hover:bg-[#1b4d3e] transition-all flex items-center justify-center gap-2 mb-6 shadow-sm">
                        + Добавить растение
                    </button>
                    <div id="plants-list" class="space-y-3 max-h-[50vh] overflow-y-auto"></div>
                </div>
                <div class="p-5 border-t border-gray-100 mt-auto">
                    <h3 class="text-sm font-semibold text-gray-500 mb-3">⚡ Быстрые действия</h3>
                    <button id="quick-water-btn" class="w-full flex items-center gap-3 p-3 rounded-xl bg-gray-50 hover:bg-[#e6f4ea] transition-all border border-gray-100 text-gray-700">
                        <span>💧</span> <span>Полив сейчас</span>
                    </button>
                </div>
                <div class="p-5 border-t border-gray-100">
                    <h3 class="text-sm font-semibold text-gray-500 mb-3">📅 Сегодня</h3>
                    <div id="sidebar-today-events" class="space-y-2 text-sm"></div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 flex flex-col overflow-hidden">
                <!-- Tabs -->
                <div class="bg-white/70 backdrop-blur-sm rounded-xl p-1 inline-flex gap-1 mb-5 shadow-sm">
                    <button id="tab-dashboard" class="tab-btn flex items-center gap-2 px-5 py-2 rounded-lg font-medium transition-all tab-active">
                        <span>📊</span> <span>Обзор</span>
                    </button>
                    <button id="tab-fertilizers" class="tab-btn flex items-center gap-2 px-5 py-2 rounded-lg font-medium transition-all tab-inactive">
                        <span>🧪</span> <span>Удобрения</span>
                    </button>
                    <button id="tab-recipes" class="tab-btn flex items-center gap-2 px-5 py-2 rounded-lg font-medium transition-all tab-inactive">
                        <span>📖</span> <span>Рецепты</span>
                    </button>
                    <button id="tab-history" class="tab-btn flex items-center gap-2 px-5 py-2 rounded-lg font-medium transition-all tab-inactive">
                        <span>📜</span> <span>История</span>
                    </button>
                </div>

                <!-- Content Area -->
                <div class="flex-1 overflow-y-auto pb-5">
                    <!-- Dashboard -->
                    <div id="content-dashboard" class="tab-content">
                        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                            <h2 class="text-xl font-semibold text-gray-800">Календарь ухода</h2>
                            <div class="flex items-center gap-2 bg-white rounded-full p-1 shadow-sm">
                                <button id="prev-month-btn" class="p-2 hover:bg-gray-100 rounded-full">←</button>
                                <h3 id="current-month" class="text-sm font-medium w-32 text-center">Август 2025</h3>
                                <button id="next-month-btn" class="p-2 hover:bg-gray-100 rounded-full">→</button>
                                <button id="today-btn" class="px-3 py-1 text-xs bg-gray-100 rounded-full hover:bg-gray-200">Сегодня</button>
                            </div>
                        </div>
                        <div id="plant-calendars-container" class="space-y-6"></div>
                        <div id="no-plants-message" class="text-center py-16 bg-white rounded-2xl shadow-sm">
                            <div class="text-5xl mb-3">🌱</div>
                            <h3 class="text-lg font-semibold mb-2">Нет растений</h3>
                            <p class="text-gray-500 mb-4">Добавьте первое растение, чтобы начать</p>
                            <button onclick="app.showPlantModal()" class="bg-[#2d6a4f] text-white px-5 py-2 rounded-xl">+ Добавить</button>
                        </div>
                    </div>

                    <!-- Fertilizers -->
                    <div id="content-fertilizers" class="tab-content hidden">
                        <div class="flex justify-between items-center mb-5">
                            <h2 class="text-xl font-semibold">Удобрения</h2>
                            <button id="add-fertilizer-btn" class="bg-[#2d6a4f] text-white px-4 py-2 rounded-xl text-sm">+ Добавить</button>
                        </div>
                        <div id="fertilizers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    </div>

                    <!-- Recipes -->
                    <div id="content-recipes" class="tab-content hidden">
                        <div class="flex justify-between items-center mb-5">
                            <h2 class="text-xl font-semibold">Рецепты полива</h2>
                            <button id="add-recipe-btn" class="bg-[#2d6a4f] text-white px-4 py-2 rounded-xl text-sm">+ Создать</button>
                        </div>
                        <div id="recipes-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>

                    <!-- History -->
                    <div id="content-history" class="tab-content hidden">
                        <div class="flex flex-wrap justify-between gap-4 mb-5">
                            <h2 class="text-xl font-semibold">История поливов</h2>
                            <div class="flex gap-2">
                                <select id="history-plant-filter" class="bg-white border border-gray-200 rounded-xl px-3 py-1.5 text-sm"></select>
                                <select id="history-period-filter" class="bg-white border border-gray-200 rounded-xl px-3 py-1.5 text-sm">
                                    <option value="7">7 дней</option>
                                    <option value="30">30 дней</option>
                                    <option value="90">3 месяца</option>
                                    <option value="all">Всё</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                            <div class="bg-white p-4 rounded-xl shadow-sm"><div class="text-xs text-gray-500">Поливов</div><div id="total-waterings" class="text-2xl font-bold text-[#2d6a4f]">0</div></div>
                            <div class="bg-white p-4 rounded-xl shadow-sm"><div class="text-xs text-gray-500">Всего литров</div><div id="total-volume" class="text-2xl font-bold text-[#0f67b3]">0л</div></div>
                            <div class="bg-white p-4 rounded-xl shadow-sm"><div class="text-xs text-gray-500">В среднем</div><div id="average-volume" class="text-2xl font-bold text-[#16a34a]">0л</div></div>
                            <div class="bg-white p-4 rounded-xl shadow-sm"><div class="text-xs text-gray-500">Частый рецепт</div><div id="popular-recipe" class="text-sm font-medium text-[#9333ea]">-</div></div>
                        </div>
                        <div id="watering-history-list" class="space-y-3"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="plant-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[85vh] overflow-auto p-6 shadow-xl"></div>
    </div>
    <div id="fertilizer-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl"></div>
    </div>
    <div id="recipe-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full p-6 shadow-xl"></div>
    </div>
    <div id="watering-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full p-6 shadow-xl"></div>
    </div>
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl"></div>
    </div>
    <input type="file" id="data-import-input" accept=".json" style="display: none;">

    <script>
        // Упрощённое, но полностью функциональное приложение
        class PlantApp {
            constructor() {
                this.data = {
                    plants: {},
                    fertilizers: {},
                    recipes: {},
                    wateringHistory: {},
                    lightPhases: {},
                    settings: { currentView: 'dashboard', selectedPlant: null, currentDate: new Date(), language: 'ru' }
                };
                this.currentMonth = new Date();
                this.init();
            }

            loadData() {
                const saved = localStorage.getItem('plantCareData');
                if (saved) { this.data = JSON.parse(saved); this.data.settings.currentDate = new Date(this.data.settings.currentDate || new Date()); this.currentMonth = new Date(this.data.settings.currentDate); }
                if (!this.data.fertilizers || Object.keys(this.data.fertilizers).length === 0) {
                    this.data.fertilizers = {
                        'grow': { id: 'grow', name: 'BioGrow', npk: { n: 4, p: 2, k: 3 }, density: 1 },
                        'bloom': { id: 'bloom', name: 'BioBloom', npk: { n: 2, p: 5, k: 4 }, density: 1 }
                    };
                }
                if (!this.data.recipes || Object.keys(this.data.recipes).length === 0) {
                    this.data.recipes = { 'veg': { id: 'veg', name: 'Вегетация', volume: 1, fertilizers: [{ fertilizerId: 'grow', dose: 2 }] } };
                }
                if (!this.data.lightPhases) this.data.lightPhases = {};
                this.saveData();
            }
            saveData() { localStorage.setItem('plantCareData', JSON.stringify(this.data)); }

            getPhase(plantId, date) {
                const target = new Date(date).toISOString().split('T')[0];
                return Object.values(this.data.lightPhases).find(p => p.plantId === plantId && target >= p.startDate && target <= (p.endDate || '2999-12-31'));
            }
            getDays(plantId, date) {
                const plant = this.data.plants[plantId];
                return plant ? Math.floor((new Date(date) - new Date(plant.plantDate)) / 86400000) + 1 : 0;
            }
            needsWater(plantId) {
                const last = Object.values(this.data.wateringHistory).filter(w => w.plantIds.includes(plantId)).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
                if (!last) return true;
                return (new Date() - new Date(last.date)) > 3 * 86400000;
            }

            initEvents() {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', (e) => this.switchTab(e.currentTarget.id.replace('tab-',''))));
                document.getElementById('add-plant-btn').onclick = () => this.showPlantModal();
                document.getElementById('quick-water-btn').onclick = () => this.showWaterModal();
                document.getElementById('settings-btn').onclick = () => this.showSettings();
                document.getElementById('prev-month-btn').onclick = () => { this.currentMonth.setMonth(this.currentMonth.getMonth()-1); this.renderCalendar(); };
                document.getElementById('next-month-btn').onclick = () => { this.currentMonth.setMonth(this.currentMonth.getMonth()+1); this.renderCalendar(); };
                document.getElementById('today-btn').onclick = () => { this.currentMonth = new Date(); this.renderCalendar(); };
                document.getElementById('language-btn').onclick = () => document.getElementById('language-dropdown').classList.toggle('hidden');
                document.getElementById('lang-ru').onclick = () => this.setLang('ru');
                document.getElementById('lang-en').onclick = () => this.setLang('en');
                document.getElementById('mobile-menu-btn').onclick = () => {
                    document.getElementById('sidebar').classList.toggle('-translate-x-full');
                    document.getElementById('mobile-overlay').classList.toggle('hidden');
                };
                document.getElementById('mobile-overlay').onclick = () => {
                    document.getElementById('sidebar').classList.add('-translate-x-full');
                    document.getElementById('mobile-overlay').classList.add('hidden');
                };
                document.getElementById('add-fertilizer-btn')?.addEventListener('click', () => this.showFertModal());
                document.getElementById('add-recipe-btn')?.addEventListener('click', () => this.showRecipeModal());
            }

            switchTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('tab-active');
                    btn.classList.add('tab-inactive');
                });
                const active = document.getElementById(`tab-${tab}`);
                if (active) { active.classList.remove('tab-inactive'); active.classList.add('tab-active'); }
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(`content-${tab}`)?.classList.remove('hidden');
                this.data.settings.currentView = tab;
                this.saveData();
                if (tab === 'dashboard') this.renderCalendar();
                if (tab === 'fertilizers') this.renderFerts();
                if (tab === 'recipes') this.renderRecipes();
                if (tab === 'history') this.renderHistory();
            }

            renderUI() {
                this.renderPlantList();
                this.switchTab(this.data.settings.currentView);
                this.renderToday();
            }

            renderPlantList() {
                const container = document.getElementById('plants-list');
                const plants = Object.values(this.data.plants);
                container.innerHTML = '';
                plants.forEach(p => {
                    const isSelected = p.id === this.data.settings.selectedPlant;
                    const needWater = this.needsWater(p.id);
                    const div = document.createElement('div');
                    div.className = `cursor-pointer rounded-xl p-3 transition-all ${isSelected ? 'bg-[#e6f4ea] border border-[#2d6a4f]/30' : 'bg-gray-50 hover:bg-gray-100'} border border-gray-100`;
                    div.onclick = () => { this.data.settings.selectedPlant = p.id; this.saveData(); this.renderUI(); this.renderCalendar(); };
                    div.innerHTML = `<div class="flex items-center gap-3"><div class="w-9 h-9 rounded-full bg-[#e6f4ea] flex items-center justify-center text-lg">🌿</div><div class="flex-1"><div class="font-medium ${needWater ? 'text-red-600' : ''}">${p.name}</div><div class="text-xs text-gray-500">День ${this.getDays(p.id, new Date())}</div></div>${needWater ? '<span class="text-red-500 text-sm animate-pulse">💧</span>' : ''}</div>`;
                    container.appendChild(div);
                });
            }

            renderCalendar() {
                const container = document.getElementById('plant-calendars-container');
                const noMsg = document.getElementById('no-plants-message');
                const plants = Object.values(this.data.plants);
                if (plants.length === 0) { container.classList.add('hidden'); noMsg.classList.remove('hidden'); return; }
                container.classList.remove('hidden'); noMsg.classList.add('hidden');
                const selected = this.data.settings.selectedPlant ? this.data.plants[this.data.settings.selectedPlant] : plants[0];
                if (!selected) return;

                const year = this.currentMonth.getFullYear(), month = this.currentMonth.getMonth();
                const firstDay = new Date(year, month, 1);
                const start = new Date(firstDay);
                start.setDate(start.getDate() - (firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1));
                const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
                document.getElementById('current-month').innerHTML = `${monthNames[month]} ${year}`;

                let html = `<div class="bg-white rounded-2xl shadow-sm overflow-hidden"><div class="p-4 border-b border-gray-100"><h3 class="font-semibold text-lg">${selected.name}</h3></div><div class="grid grid-cols-7 text-center py-2 text-xs font-medium text-gray-500 border-b border-gray-100"><div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div></div><div class="grid grid-cols-7">`;
                for (let i=0; i<42; i++) {
                    const d = new Date(start); d.setDate(start.getDate()+i);
                    const isCurr = d.getMonth() === month;
                    const isToday = d.toDateString() === new Date().toDateString();
                    const phase = this.getPhase(selected.id, d);
                    const waterToday = Object.values(this.data.wateringHistory).filter(w => w.plantIds.includes(selected.id) && new Date(w.date).toDateString() === d.toDateString()).length;
                    let icons = '';
                    if (phase) icons += `<span class="text-sm mr-1">${phase.type === 'vegetation' ? '🌱' : '🌸'}</span>`;
                    if (waterToday) icons += `<span class="text-blue-500 text-xs">💧</span>`;
                    html += `<div class="min-h-[70px] p-1.5 ${isCurr ? 'bg-white' : 'bg-gray-50/50'} ${isToday ? 'ring-2 ring-[#2d6a4f] rounded-xl' : ''} calendar-day"><div class="text-sm ${isToday ? 'font-bold text-[#2d6a4f]' : 'text-gray-600'}">${d.getDate()}</div><div class="text-xs mt-1">${icons}</div></div>`;
                }
                html += `</div></div>`;
                container.innerHTML = html;
            }

            renderToday() {
                const container = document.getElementById('sidebar-today-events');
                const today = new Date().toDateString();
                const events = Object.values(this.data.wateringHistory).filter(w => new Date(w.date).toDateString() === today);
                if (events.length === 0) { container.innerHTML = '<div class="text-gray-400 text-xs">Нет событий</div>'; return; }
                container.innerHTML = events.map(e => `<div class="bg-gray-50 p-2 rounded-lg text-xs"><span class="font-medium">💧</span> ${e.plantIds.map(id=>this.data.plants[id]?.name).join(', ')} ${e.volume}л</div>`).join('');
            }

            renderFerts() {
                const grid = document.getElementById('fertilizers-grid');
                const ferts = Object.values(this.data.fertilizers);
                grid.innerHTML = ferts.map(f => `<div class="bg-white rounded-xl p-4 shadow-sm"><div class="flex justify-between items-center"><div class="font-medium">${f.name}</div><div><button onclick="app.editFert('${f.id}')" class="text-xs text-gray-500 mr-2">✏️</button><button onclick="app.delFert('${f.id}')" class="text-xs text-red-500">🗑️</button></div></div><div class="flex gap-3 mt-2 text-sm"><span>N ${f.npk.n}%</span><span>P ${f.npk.p}%</span><span>K ${f.npk.k}%</span></div></div>`).join('');
            }

            renderRecipes() {
                const cont = document.getElementById('recipes-list');
                const recs = Object.values(this.data.recipes);
                cont.innerHTML = recs.map(r => `<div class="bg-white rounded-xl p-4 shadow-sm"><div class="flex justify-between"><span class="font-medium">${r.name}</span><div><button onclick="app.editRec('${r.id}')" class="text-xs text-gray-500 mr-2">✏️</button><button onclick="app.delRec('${r.id}')" class="text-xs text-red-500">🗑️</button></div></div><div class="text-sm text-gray-500 mt-1">📏 ${r.volume}л • Удобрений: ${r.fertilizers.length}</div></div>`).join('');
            }

            renderHistory() {
                const filter = document.getElementById('history-plant-filter');
                filter.innerHTML = '<option value="">Все</option>' + Object.values(this.data.plants).map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                const waterings = Object.values(this.data.wateringHistory).sort((a,b)=>new Date(b.date)-new Date(a.date));
                const listDiv = document.getElementById('watering-history-list');
                if (!waterings.length) { listDiv.innerHTML = '<div class="text-center text-gray-400 py-8">Нет поливов</div>'; return; }
                listDiv.innerHTML = waterings.map(w => `<div class="bg-white rounded-xl p-3 shadow-sm flex justify-between items-center"><div><div class="font-medium">${w.plantIds.map(id=>this.data.plants[id]?.name).join(', ')}</div><div class="text-xs text-gray-500">${new Date(w.date).toLocaleString()} • ${w.volume}л</div></div><button onclick="app.delWater('${w.id}')" class="text-red-500 text-sm">Удалить</button></div>`).join('');
                const total = waterings.length, totalVol = waterings.reduce((s,w)=>s+w.volume,0);
                document.getElementById('total-waterings').innerText = total;
                document.getElementById('total-volume').innerText = totalVol.toFixed(1)+'л';
                document.getElementById('average-volume').innerText = total ? (totalVol/total).toFixed(1)+'л' : '0л';
            }

            // Модалки
            showPlantModal() {
                const modal = document.getElementById('plant-modal');
                modal.classList.remove('hidden');
                modal.innerHTML = `<div class="bg-white rounded-2xl p-6"><h2 class="text-xl font-semibold mb-4">🌱 Новое растение</h2><form id="plant-form"><input id="plant-name" placeholder="Название" class="w-full mb-3" required><input id="plant-date" type="date" class="w-full mb-3" required><input id="plant-strain" placeholder="Сорт (опционально)" class="w-full mb-4"><div class="flex gap-3"><button type="submit" class="flex-1 bg-[#2d6a4f] text-white py-2 rounded-xl">Сохранить</button><button type="button" id="plant-cancel" class="flex-1 border border-gray-300 py-2 rounded-xl">Отмена</button></div></form></div>`;
                document.getElementById('plant-form').onsubmit = (e) => {
                    e.preventDefault();
                    const id = 'p'+Date.now();
                    this.data.plants[id] = { id, name: document.getElementById('plant-name').value, plantDate: document.getElementById('plant-date').value, strain: document.getElementById('plant-strain').value, growthPhases: { vegetation: 28, flowering: 63 } };
                    this.saveData();
                    this.renderUI();
                    modal.classList.add('hidden');
                };
                document.getElementById('plant-cancel').onclick = () => modal.classList.add('hidden');
            }

            showWaterModal() {
                const modal = document.getElementById('watering-modal');
                modal.classList.remove('hidden');
                const plantsHtml = Object.values(this.data.plants).map(p => `<label class="flex items-center gap-2 mb-2"><input type="checkbox" name="water-plants" value="${p.id}" class="rounded border-gray-300"> ${p.name}</label>`).join('');
                modal.innerHTML = `<div class="bg-white rounded-2xl p-6"><h2 class="text-xl font-semibold mb-4">💧 Полив</h2><form id="water-form"><input id="water-vol" type="number" step="0.1" placeholder="Объем (л)" class="w-full mb-3" required><div class="mb-4">${plantsHtml}</div><button type="submit" class="w-full bg-[#2d6a4f] text-white py-2 rounded-xl">Записать полив</button></form><button id="water-cancel" class="w-full mt-3 text-gray-500 text-sm">Отмена</button></div>`;
                document.getElementById('water-form').onsubmit = (e) => {
                    e.preventDefault();
                    const vol = parseFloat(document.getElementById('water-vol').value);
                    const selected = Array.from(document.querySelectorAll('input[name="water-plants"]:checked')).map(cb => cb.value);
                    if (!selected.length) return alert('Выберите растения');
                    const id = 'w'+Date.now();
                    this.data.wateringHistory[id] = { id, date: new Date().toISOString(), volume: vol, plantIds: selected, recipeId: null };
                    this.saveData();
                    this.renderUI();
                    modal.classList.add('hidden');
                };
                document.getElementById('water-cancel').onclick = () => modal.classList.add('hidden');
            }

            showFertModal() {
                const modal = document.getElementById('fertilizer-modal');
                modal.classList.remove('hidden');
                modal.innerHTML = `<div class="bg-white rounded-2xl p-6"><h2 class="text-xl font-semibold mb-4">Добавить удобрение</h2><form id="fert-form"><input id="fert-name" placeholder="Название" class="w-full mb-3"><div class="grid grid-cols-3 gap-2 mb-4"><input id="fert-n" placeholder="N %" class="text-center"><input id="fert-p" placeholder="P %" class="text-center"><input id="fert-k" placeholder="K %" class="text-center"></div><button type="submit" class="w-full bg-[#2d6a4f] text-white py-2 rounded-xl">Сохранить</button></form><button id="fert-cancel" class="w-full mt-3 text-gray-500 text-sm">Отмена</button></div>`;
                document.getElementById('fert-form').onsubmit = (e) => {
                    e.preventDefault();
                    const id = 'f'+Date.now();
                    this.data.fertilizers[id] = { id, name: document.getElementById('fert-name').value, npk: { n: parseFloat(document.getElementById('fert-n').value)||0, p: parseFloat(document.getElementById('fert-p').value)||0, k: parseFloat(document.getElementById('fert-k').value)||0 }, density: 1 };
                    this.saveData();
                    this.renderFerts();
                    modal.classList.add('hidden');
                };
                document.getElementById('fert-cancel').onclick = () => modal.classList.add('hidden');
            }

            showRecipeModal() {
                const modal = document.getElementById('recipe-modal');
                modal.classList.remove('hidden');
                modal.innerHTML = `<div class="bg-white rounded-2xl p-6"><h2 class="text-xl font-semibold mb-4">Создать рецепт</h2><form id="rec-form"><input id="rec-name" placeholder="Название" class="w-full mb-3"><input id="rec-vol" placeholder="Объем (л)" class="w-full mb-4"><button type="submit" class="w-full bg-[#2d6a4f] text-white py-2 rounded-xl">Сохранить</button></form><button id="rec-cancel" class="w-full mt-3 text-gray-500 text-sm">Отмена</button></div>`;
                document.getElementById('rec-form').onsubmit = (e) => {
                    e.preventDefault();
                    const id = 'r'+Date.now();
                    this.data.recipes[id] = { id, name: document.getElementById('rec-name').value, volume: parseFloat(document.getElementById('rec-vol').value)||1, fertilizers: [] };
                    this.saveData();
                    this.renderRecipes();
                    modal.classList.add('hidden');
                };
                document.getElementById('rec-cancel').onclick = () => modal.classList.add('hidden');
            }

            showSettings() {
                const modal = document.getElementById('settings-modal');
                modal.classList.remove('hidden');
                modal.innerHTML = `<div class="bg-white rounded-2xl p-6"><h2 class="text-xl font-semibold mb-4">Настройки</h2><div class="flex gap-3"><button id="export-btn" class="flex-1 bg-gray-100 py-2 rounded-xl">Экспорт</button><button id="import-btn" class="flex-1 bg-gray-100 py-2 rounded-xl">Импорт</button></div><button id="settings-close" class="w-full mt-4 border border-gray-300 py-2 rounded-xl">Закрыть</button></div>`;
                document.getElementById('export-btn').onclick = () => {
                    const blob = new Blob([JSON.stringify(this.data,null,2)], {type:'application/json'});
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${new Date().toISOString().split('T')[0]}.json`; a.click();
                };
                document.getElementById('import-btn').onclick = () => document.getElementById('data-import-input').click();
                document.getElementById('settings-close').onclick = () => modal.classList.add('hidden');
            }

            importData(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => { try { const d = JSON.parse(ev.target.result); if (d.plants) this.data = d; this.saveData(); this.renderUI(); alert('Импорт готов'); } catch(e){ alert('Ошибка'); } };
                reader.readAsText(file);
                e.target.value = '';
            }

            editFert(id) { this.showFertModal(id); }
            delFert(id) { if(confirm('Удалить удобрение?')){ delete this.data.fertilizers[id]; this.saveData(); this.renderFerts(); } }
            editRec(id) { this.showRecipeModal(id); }
            delRec(id) { if(confirm('Удалить рецепт?')){ delete this.data.recipes[id]; this.saveData(); this.renderRecipes(); } }
            delWater(id) { if(confirm('Удалить запись о поливе?')){ delete this.data.wateringHistory[id]; this.saveData(); this.renderHistory(); this.renderCalendar(); } }

            setLang(lang) { this.data.settings.language = lang; this.saveData(); document.getElementById('current-lang').innerText = lang.toUpperCase(); document.getElementById('language-dropdown').classList.add('hidden'); }

            init() { this.loadData(); this.initEvents(); this.renderUI(); }
        }
        window.app = new PlantApp();
    </script>
</body>
</html>
